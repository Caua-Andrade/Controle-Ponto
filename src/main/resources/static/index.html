<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Controle de Ponto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
          --bg:       #0d0f14;
          --surface:  #141720;
          --border:   #252a38;
          --accent:   #00e5a0;
          --accent2:  #0099ff;
          --warn:     #ff4f4f;
          --text:     #e8ecf4;
          --muted:    #5a6278;
          --mono:     'Share Tech Mono', monospace;
          --sans:     'Barlow', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
          background: var(--bg);
          color: var(--text);
          font-family: var(--sans);
          min-height: 100vh;
          display: flex;
          flex-direction: column;
          align-items: center;
          padding: 40px 16px 80px;
          position: relative;
          overflow-x: hidden;
        }

        /* Background grid */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            linear-gradient(var(--border) 1px, transparent 1px),
            linear-gradient(90deg, var(--border) 1px, transparent 1px);
          background-size: 48px 48px;
          opacity: 0.35;
          pointer-events: none;
          z-index: 0;
        }

        /* Glow blob */
        body::after {
          content: '';
          position: fixed;
          top: -120px;
          left: 50%;
          transform: translateX(-50%);
          width: 600px;
          height: 320px;
          background: radial-gradient(ellipse, rgba(0,229,160,.12) 0%, transparent 70%);
          pointer-events: none;
          z-index: 0;
        }

        .wrapper {
          position: relative;
          z-index: 1;
          width: 100%;
          max-width: 480px;
        }

        /* ─── HEADER ─── */
        header {
          text-align: center;
          margin-bottom: 40px;
        }

        .badge {
          display: inline-block;
          font-family: var(--mono);
          font-size: 11px;
          letter-spacing: 3px;
          color: var(--accent);
          border: 1px solid var(--accent);
          padding: 4px 12px;
          margin-bottom: 16px;
          text-transform: uppercase;
        }

        h1 {
          font-size: clamp(26px, 6vw, 36px);
          font-weight: 700;
          letter-spacing: -0.5px;
          line-height: 1.1;
        }

        h1 span {
          color: var(--accent);
        }

        .subtitle {
          margin-top: 8px;
          font-size: 14px;
          color: var(--muted);
          font-weight: 300;
          letter-spacing: 0.5px;
        }

        /* ─── CARD ─── */
        .card {
          background: var(--surface);
          border: 1px solid var(--border);
          padding: 32px;
          position: relative;
        }

        .card::before {
          content: '';
          position: absolute;
          top: 0; left: 0; right: 0;
          height: 2px;
          background: linear-gradient(90deg, var(--accent), var(--accent2));
        }

        /* ─── SECTION LABEL ─── */
        .section-label {
          font-family: var(--mono);
          font-size: 10px;
          letter-spacing: 3px;
          color: var(--muted);
          text-transform: uppercase;
          margin-bottom: 16px;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        .section-label::after {
          content: '';
          flex: 1;
          height: 1px;
          background: var(--border);
        }

        /* ─── FIELD ─── */
        .field {
          margin-bottom: 20px;
        }

        label {
          display: flex;
          align-items: center;
          gap: 6px;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 1.5px;
          color: var(--muted);
          text-transform: uppercase;
          margin-bottom: 8px;
        }

        label .dot {
          width: 6px; height: 6px;
          border-radius: 50%;
          background: var(--accent);
          flex-shrink: 0;
        }

        label .dot.blue  { background: var(--accent2); }
        label .dot.pause { background: #ffd166; }

        input[type="text"] {
          width: 100%;
          background: var(--bg);
          border: 1px solid var(--border);
          color: var(--text);
          font-family: var(--mono);
          font-size: 22px;
          letter-spacing: 4px;
          padding: 12px 16px;
          outline: none;
          transition: border-color .2s, box-shadow .2s;
          -webkit-appearance: none;
        }

        input[type="text"]::placeholder { color: var(--muted); letter-spacing: 2px; }

        input[type="text"]:focus {
          border-color: var(--accent);
          box-shadow: 0 0 0 3px rgba(0,229,160,.08);
        }

        input[type="text"].error {
          border-color: var(--warn);
          box-shadow: 0 0 0 3px rgba(255,79,79,.08);
        }

        .field-hint {
          font-size: 11px;
          color: var(--muted);
          margin-top: 5px;
          font-family: var(--mono);
        }

        /* ─── DIVIDER ─── */
        .divider {
          border: none;
          border-top: 1px solid var(--border);
          margin: 24px 0;
        }

        /* ─── BUTTON ─── */
        button {
          width: 100%;
          background: var(--accent);
          color: #000;
          border: none;
          padding: 16px;
          font-family: var(--sans);
          font-size: 13px;
          font-weight: 700;
          letter-spacing: 3px;
          text-transform: uppercase;
          cursor: pointer;
          position: relative;
          overflow: hidden;
          transition: opacity .2s, transform .1s;
        }

        button:active { transform: scale(.99); }
        button:hover { opacity: .9; }

        button .btn-shine {
          position: absolute;
          top: 0; left: -100%;
          width: 60%;
          height: 100%;
          background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
          transition: left .5s;
        }
        button:hover .btn-shine { left: 160%; }

        /* ─── RESULT ─── */
        #resultado {
          margin-top: 24px;
          display: none;
          animation: fadeUp .4s ease forwards;
        }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(10px); }
          to   { opacity: 1; transform: translateY(0); }
        }

        .result-box {
          border: 1px solid var(--accent);
          background: rgba(0,229,160,.04);
          padding: 24px;
          text-align: center;
        }

        .result-label {
          font-family: var(--mono);
          font-size: 10px;
          letter-spacing: 3px;
          color: var(--accent);
          text-transform: uppercase;
          margin-bottom: 8px;
        }

        .result-time {
          font-family: var(--mono);
          font-size: clamp(36px, 12vw, 56px);
          font-weight: 400;
          color: var(--accent);
          letter-spacing: 6px;
          line-height: 1;
        }

        .result-meta {
          margin-top: 16px;
          display: flex;
          gap: 16px;
          justify-content: center;
          flex-wrap: wrap;
        }

        .meta-chip {
          background: var(--bg);
          border: 1px solid var(--border);
          padding: 6px 14px;
          font-family: var(--mono);
          font-size: 11px;
          color: var(--muted);
          letter-spacing: 1px;
        }

        .meta-chip span {
          color: var(--text);
        }

        /* ─── ERROR ─── */
        .error-box {
          border: 1px solid var(--warn);
          background: rgba(255,79,79,.05);
          padding: 14px 18px;
          font-size: 13px;
          color: var(--warn);
          font-family: var(--mono);
          letter-spacing: 0.5px;
        }

        /* ─── COUNTDOWN ─── */
        .countdown-section {
          margin-top: 16px;
          padding: 16px;
          background: var(--bg);
          border: 1px solid var(--border);
        }

        .countdown-label {
          font-family: var(--mono);
          font-size: 10px;
          letter-spacing: 3px;
          color: var(--muted);
          margin-bottom: 6px;
        }

        #countdown {
          font-family: var(--mono);
          font-size: 20px;
          letter-spacing: 3px;
          color: var(--accent2);
        }

        /* ─── FOOTER ─── */
        footer {
          margin-top: 32px;
          text-align: center;
          font-family: var(--mono);
          font-size: 11px;
          color: var(--muted);
          letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 400px) {
          .card { padding: 24px 20px; }
        }
    </style>
</head>
<body>

<div class="wrapper">

    <header>
        <div class="badge">v1.0 &mdash; Sistema de Ponto</div>
        <h1>Controle de <span>Ponto</span></h1>
        <p class="subtitle">Calcule o horário de saída considerando 6h obrigatórias</p>
    </header>

    <div class="card">
        <p class="section-label">Jornada</p>

        <div class="field">
            <label><span class="dot"></span> Início do trabalho</label>
            <input type="text" id="inicioTrabalho" placeholder="08:00" maxlength="5" />
            <div class="field-hint">formato 24h → HH:mm</div>
        </div>

        <hr class="divider">
        <p class="section-label">Pausa</p>

        <div class="field">
            <label><span class="dot pause"></span> Início da pausa</label>
            <input type="text" id="inicioPausa" placeholder="12:00" maxlength="5" />
        </div>

        <div class="field">
            <label><span class="dot blue"></span> Fim da pausa</label>
            <input type="text" id="fimPausa" placeholder="13:00" maxlength="5" />
        </div>

        <button onclick="calcular()">
            <span class="btn-shine"></span>
            Calcular Horário de Saída
        </button>

        <div id="resultado"></div>
    </div>

    <footer>
        spring boot · java 17 · 6h obrigatórias
    </footer>

</div>

<script>
    // Auto-formata HH:mm enquanto digita
    document.querySelectorAll('input[type="text"]').forEach(input => {
      input.addEventListener('input', function () {
        let v = this.value.replace(/\D/g, '');
        if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);
        this.value = v;
        this.classList.remove('error');
      });
    });

    const RE_TIME = /^([01]\d|2[0-3]):([0-5]\d)$/;

    function getVal(id) {
      return document.getElementById(id).value.trim();
    }

    function markError(id) {
      document.getElementById(id).classList.add('error');
    }

    let countdownInterval = null;

    function calcular() {
      const div = document.getElementById('resultado');
      div.style.display = 'none';
      div.innerHTML = '';

      const inicio = getVal('inicioTrabalho');
      const pInicio = getVal('inicioPausa');
      const pFim    = getVal('fimPausa');

      let valid = true;
      if (!RE_TIME.test(inicio))  { markError('inicioTrabalho'); valid = false; }
      if (!RE_TIME.test(pInicio)) { markError('inicioPausa');    valid = false; }
      if (!RE_TIME.test(pFim))    { markError('fimPausa');       valid = false; }

      if (!valid) {
        div.innerHTML = `<div class="error-box">⚠ Preencha todos os campos no formato HH:mm</div>`;
        div.style.display = 'block';
        return;
      }

      const url = `/api/calcular?inicioTrabalho=${encodeURIComponent(inicio)}&inicioPausa=${encodeURIComponent(pInicio)}&fimPausa=${encodeURIComponent(pFim)}`;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (data.erro) {
            div.innerHTML = `<div class="error-box">⚠ ${data.erro}</div>`;
          } else {
            div.innerHTML = `
              <div class="result-box">
                <div class="result-label">Horário de saída</div>
                <div class="result-time">${data.saida}</div>
                <div class="result-meta">
                  <div class="meta-chip">Pausa: <span>${data.duracaoPausa}</span></div>
                  <div class="meta-chip">Antes da pausa: <span>${data.trabalhadoAntesPausa}</span></div>
                </div>
              </div>
              <div class="countdown-section">
                <div class="countdown-label">Tempo restante</div>
                <div id="countdown">--:--:--</div>
              </div>
            `;
            startCountdown(data.saida);
          }
          div.style.display = 'block';
        })
        .catch(() => {
          div.innerHTML = `<div class="error-box">⚠ Não foi possível conectar ao servidor. Verifique se o Spring Boot está rodando.</div>`;
          div.style.display = 'block';
        });
    }

    function startCountdown(saidaStr) {
      if (countdownInterval) clearInterval(countdownInterval);

      function update() {
        const el = document.getElementById('countdown');
        if (!el) { clearInterval(countdownInterval); return; }

        const now   = new Date();
        const [h, m] = saidaStr.split(':').map(Number);
        const saida = new Date();
        saida.setHours(h, m, 0, 0);

        const diff = saida - now;

        if (diff <= 0) {
          el.textContent = '00:00:00';
          el.style.color = 'var(--accent)';
          clearInterval(countdownInterval);
          return;
        }

        const hh = String(Math.floor(diff / 3600000)).padStart(2,'0');
        const mm = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
        const ss = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
        el.textContent = `${hh}:${mm}:${ss}`;
      }

      update();
      countdownInterval = setInterval(update, 1000);
    }
</script>
</body>
</html>
